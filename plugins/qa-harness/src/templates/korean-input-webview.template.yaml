# Korean Input (WebView Renderer) Template
# Uses Flask input server + CDP atomic (find + focus + setValue) for text input.
#
# Slots:
#   {{ cdpSelector }} - source: catalog  - CSS selector for the WebView element
#   {{ inputText }}   - source: testdata - Text to input (Korean or any)
#   {{ deviceId }}    - source: computed  - Target device identifier
#   {{ inputServer }} - source: computed  - Flask input server URL (default: http://localhost:5100)
#   {{ appId }}       - source: computed  - App package name (default: com.alphaz.app)

tags:
  - korean-input
  - webview
  - cdp-nativeValueSetter

---
# Step 1: Input text via CDP nativeValueSetter (single evaluate call)
- runScript:
    file: "scripts/input_text_remote.js"
    env:
      TAP_SELECTOR: "{{ cdpSelector }}"
      TEXT: "{{ inputText }}"
      DEVICE: "{{ deviceId }}"
      APP_ID: "{{ appId }}"
      INPUT_SERVER: "{{ inputServer }}"
    label: "Korean WebView input via nativeValueSetter"

# Step 2: Brief wait for React state update
# Minor fix: waitForAnimationToEnd takes no timeout param
- waitForAnimationToEnd
