appId: com.cupist.alpha
---
- launchApp
- runFlow:
    file: "flows/login_prerequisite.yaml"
- tapOn:
    id: "{{profile_field_selector}}"
- runScript:
    file: "scripts/input_text_remote.js"
    env:
      TAP_SELECTOR: "{{input_selector}}"
      TEXT: "{{input_value}}"
      DEVICE: "{{deviceId}}"
      APP_ID: "{{appId}}"
      INPUT_SERVER: "{{inputServer}}"
- tapOn:
    id: "{{next_button}}"
- assertVisible:
    id: "{{expected_result_element}}"
